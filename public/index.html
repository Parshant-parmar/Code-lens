<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeLens</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- App header: keep only controls a developer needs before analysis. -->
    <header class="app-header">
      <a class="brand" href="/" aria-label="CodeLens home">
        <span class="brand-mark">CL</span>
        <span class="brand-name">CodeLens</span>
      </a>

      <div class="header-controls">
        <label class="language-field" for="languageSelect">Language</label>
        <select id="languageSelect" aria-label="Language">
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
          <option value="csharp">C#</option>
          <option value="go">Go</option>
          <option value="rust">Rust</option>
          <option value="php">PHP</option>
          <option value="ruby">Ruby</option>
        </select>

        <button id="themeToggle" class="icon-button" type="button" aria-label="Switch theme" title="Switch theme">
          Dark
        </button>
      </div>
    </header>

    <!-- Main workspace: editor first, actions second, results only after Analyze. -->
    <main class="workspace">
      <section class="editor-shell" aria-label="Code editor">
        <div id="editor" class="editor"></div>

        <div class="editor-actions">
          <button id="analyzeButton" class="primary-button" type="button">Analyze</button>
          <button id="clearButton" class="secondary-button" type="button">Clear</button>
          <button id="copyButton" class="secondary-button" type="button">Copy</button>
        </div>

        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </section>

      <!-- Hidden by default so the first screen behaves like JSONLint or regex101. -->
      <section id="resultsSection" class="results-section" hidden aria-label="Analysis results">

        <!-- Row 1: Score hero + complexity pair -->
        <div class="results-top">

          <!-- Score card -->
          <article class="r-card score-hero" aria-label="Overall score">
            <div class="score-ring-wrap">
              <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
                <circle class="score-ring-track" cx="60" cy="60" r="52"/>
                <circle class="score-ring-fill" id="scoreRingFill" cx="60" cy="60" r="52"/>
              </svg>
              <div class="score-center">
                <strong id="overallScore" class="score-number">-</strong>
                <span class="score-label">Score</span>
              </div>
            </div>
            <div class="score-meta">
              <span class="card-eyebrow">⭐ Overall Score</span>
              <div class="score-breakdown" aria-label="Score breakdown">
                <div class="breakdown-row">
                  <span class="breakdown-name">Efficiency</span>
                  <div class="breakdown-bar-track"><div class="breakdown-bar" id="bdEfficiency"></div></div>
                  <span class="breakdown-pct" id="bdEfficiencyPct"></span>
                </div>
                <div class="breakdown-row">
                  <span class="breakdown-name">Readability</span>
                  <div class="breakdown-bar-track"><div class="breakdown-bar" id="bdReadability"></div></div>
                  <span class="breakdown-pct" id="bdReadabilityPct"></span>
                </div>
                <div class="breakdown-row">
                  <span class="breakdown-name">Maintainability</span>
                  <div class="breakdown-bar-track"><div class="breakdown-bar" id="bdMaintainability"></div></div>
                  <span class="breakdown-pct" id="bdMaintainabilityPct"></span>
                </div>
                <div class="breakdown-row">
                  <span class="breakdown-name">Best Practices</span>
                  <div class="breakdown-bar-track"><div class="breakdown-bar" id="bdBestPractices"></div></div>
                  <span class="breakdown-pct" id="bdBestPracticesPct"></span>
                </div>
              </div>
            </div>
          </article>

          <!-- Complexity pair -->
          <div class="complexity-pair">
            <article class="r-card complexity-card">
              <span class="card-eyebrow">⏱ Time Complexity</span>
              <strong id="timeComplexity" class="complexity-value">-</strong>
            </article>
            <article class="r-card complexity-card">
              <span class="card-eyebrow">💾 Space Complexity</span>
              <strong id="spaceComplexity" class="complexity-value">-</strong>
            </article>
            <article class="r-card complexity-card">
              <span class="card-eyebrow">📖 Readability</span>
              <strong id="readability" class="complexity-value">-</strong>
            </article>
            <article class="r-card complexity-card">
              <span class="card-eyebrow">🛠 Maintainability</span>
              <strong id="maintainability" class="complexity-value">-</strong>
            </article>
          </div>
        </div>

        <!-- Row 2: Bugs + Suggestions side by side -->
        <div class="results-row2">
          <article class="r-card">
            <h2 class="card-title">🐞 Possible Bugs</h2>
            <ul id="possibleBugs" class="issue-list"></ul>
          </article>
          <article class="r-card">
            <h2 class="card-title">⚡ Optimization Suggestions</h2>
            <ul id="optimizationSuggestions" class="issue-list"></ul>
          </article>
        </div>

        <!-- Row 3: Accordions -->
        <div class="results-accordions">

          <article class="r-card accordion-card">
            <button class="accordion-trigger" aria-expanded="false" aria-controls="panelRefactored" type="button">
              <span>💻 Refactored Code</span>
              <svg class="chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="accordion-panel" id="panelRefactored" hidden>
              <pre class="code-block"><code id="refactoredCode"></code></pre>
            </div>
          </article>

          <article class="r-card accordion-card">
            <button class="accordion-trigger" aria-expanded="false" aria-controls="panelExplanation" type="button">
              <span>💡 Explanation</span>
              <svg class="chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="accordion-panel" id="panelExplanation" hidden>
              <p id="explanation" class="accordion-body"></p>
            </div>
          </article>

          <article class="r-card accordion-card">
            <button class="accordion-trigger" aria-expanded="false" aria-controls="panelInterview" type="button">
              <span>🎯 Interview Feedback</span>
              <svg class="chevron" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 6l4 4 4-4"/></svg>
            </button>
            <div class="accordion-panel" id="panelInterview" hidden>
              <p id="interviewFeedback" class="accordion-body"></p>
            </div>
          </article>

        </div>
      </section>
    </main>

    <!-- Monaco is loaded from a CDN so the app stays plain HTML/CSS/JS. -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
